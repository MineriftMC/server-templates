name: Build and publish server images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: paper-servers/1.21.10
            image: paper-1.21.10
          - context: paper-servers/1.21.11
            image: paper-1.21.11
          - context: paper-servers/26.1.2
            image: paper-26.1.2
          - context: premade-servers/smp
            image: smp
          - context: premade-servers/void
            image: void

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # must be lowercase no matter what
      - name: Lowercase git org
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER@L}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ matrix.image }}:${{ github.sha }}
          # plugin/jar downloads pull "latest" at build time, so don't reuse stale cache
          no-cache: true
          provenance: false
